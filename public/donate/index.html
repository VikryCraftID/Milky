<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0118">
    <title>Milky Interactive · Donate</title>
    <meta property="og:title" content="Donate · Milky Interactive">
    <meta property="og:description" content="Dukung Milky Interactive lewat QRIS. Terima kasih!">
    <meta property="og:image" content="/donate/donate.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0118;
            --bg-deep: #050010;
            --card-bg: #160a2e;
            --text-color: #f4f0ff;
            --text-muted: #b9a8e6;
            --accent-violet: #9d5cff;
            --accent-purple: #c084fc;
            --accent-magenta: #e879f9;
            --border: #2a1f52;
            --grad-purple: linear-gradient(135deg, #9d5cff 0%, #c084fc 50%, #e879f9 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 18px;
            overflow-x: hidden;
        }
        .bg-aurora {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(closest-side at 20% 15%, rgba(157, 92, 255, 0.25), transparent),
                radial-gradient(closest-side at 85% 85%, rgba(232, 121, 249, 0.18), transparent),
                var(--bg-deep);
        }
        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 460px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px 24px 32px;
            box-shadow: 0 24px 60px rgba(10, 1, 24, 0.7), 0 0 0 1px rgba(157, 92, 255, 0.08);
            text-align: center;
        }
        .brand {
            font-size: 13px; font-weight: 600; letter-spacing: 3px;
            color: var(--text-muted); text-transform: uppercase;
        }
        h1 {
            margin: 10px 0 6px;
            font-size: 30px; font-weight: 700; letter-spacing: -0.5px;
            background: var(--grad-purple);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 22px; }
        .qris-frame {
            background: #ffffff;
            border-radius: 18px;
            padding: 14px;
            box-shadow: 0 0 0 1px rgba(157, 92, 255, 0.25), 0 12px 36px rgba(157, 92, 255, 0.18);
        }
        .qris-frame img { width: 100%; height: auto; display: block; border-radius: 8px; }
        .hint {
            margin-top: 20px; font-size: 13px; color: var(--text-muted);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-magenta); box-shadow: 0 0 10px var(--accent-magenta); }
        .thanks {
            margin-top: 18px; padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 14px; color: var(--text-color); font-weight: 500;
        }
        footer { margin-top: 16px; font-size: 11px; letter-spacing: 1px; color: var(--text-muted); opacity: 0.7; }
    </style>
</head>
<body>
    <div class="bg-aurora" aria-hidden="true"></div>
    <div class="card">
        <span class="brand">Milky Interactive</span>
        <h1>Donate Us</h1>
        <p class="subtitle">Scan QRIS di bawah ini lewat aplikasi e-wallet atau m-banking favoritmu.</p>
        <div class="qris-frame">
            <img src="/donate/donate.png" alt="QRIS Donasi Milky Interactive" loading="eager">
        </div>
        <div class="hint"><span class="dot"></span> Semua e-wallet &amp; bank yang mendukung QRIS</div>
        <p class="thanks">Terima kasih telah mendukung Milky Interactive! 💜</p>
        <footer>MILKY · DONATE</footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Interactive - Wordle Games</title>
    <link rel="stylesheet" href="/wordle/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div id="user-profile" class="hidden">
                <div class="profile-main">
                    <div class="avatar-container"><img id="user-avatar" src="" alt="Avatar"></div>
                    <div class="user-info">
                        <h3 id="user-name">Loading...</h3>
                        <span id="user-id">#...</span>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="mini-stat">
                        <span id="header-played">-</span>
                        <label id="lbl-header-played">Played</label>
                    </div>
                    <div class="mini-stat">
                        <span id="header-rate">-%</span>
                        <label id="lbl-header-rate">Win Rate</label>
                    </div>
                    <div class="mini-stat">
                        <span id="header-best">-</span>
                        <label id="lbl-header-best">Best</label>
                    </div>
                </div>
            </div>
        </header>

        <div class="controls-bottom">
            <label>Language:</label>
            <select id="lang-select">
                <option value="id">Bahasa Indonesia</option>
                <option value="en">English</option>
            </select>
        </div>

        <div id="game-board">
            <!-- Grid generated by JS -->
        </div>

        <div id="status-container">
            <div id="timer-display">05:00</div>
            <div id="game-summary" class="hidden"></div>
        </div>

        <div id="keyboard">
            <!-- Keyboard generated by JS -->
        </div>

        <div id="message-container"></div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h2 id="modal-title">RESULT</h2>
            <p id="modal-message"></p>
            <div id="modal-stats" class="stats hidden">
                <div class="stat-item">
                    <span id="stat-played">0</span>
                    <label id="lbl-stat-played">Played</label>
                </div>
                <div class="stat-item">
                    <span id="stat-wins">0%</span>
                    <label id="lbl-stat-wins">Win %</label>
                </div>
            </div>
            <button id="modal-start-btn" class="hidden">Mulai!</button>
            <button id="modal-close">Close</button>
        </div>
    </div>

    <script src="/wordle/app.js"></script>
</body>
</html>

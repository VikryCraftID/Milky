<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Wordle - Cyberpunk Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="m-text">MILKY</span>
                <span class="w-text">WORDLE</span>
            </div>
            <div class="controls">
                <select id="lang-select">
                    <option value="id">Bahasa Indonesia</option>
                    <option value="en">English</option>
                </select>
                <button id="new-game-btn">New Game</button>
            </div>
        </header>

        <div id="game-board">
            <!-- Grid generated by JS -->
        </div>

        <div id="keyboard">
            <!-- Keyboard generated by JS -->
        </div>

        <div id="message-container"></div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h2 id="modal-title">RESULT</h2>
            <p id="modal-message"></p>
            <div class="stats">
                <div class="stat-item">
                    <span id="stat-played">0</span>
                    <label>Played</label>
                </div>
                <div class="stat-item">
                    <span id="stat-wins">0%</span>
                    <label>Win %</label>
                </div>
            </div>
            <button id="modal-close">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Interactive - Wordle Tutorial</title>
    <link rel="stylesheet" href="/wordle/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="tutorial-mode">
    <!-- Intro Overlay -->
    <div id="intro-overlay">
        <p id="intro-text">Kamu melihat seseorang disana, sepertinya dia akan menjadi guru barumu, dia juga memiliki energi yang positif...</p>
        <span id="intro-subtext">Klik untuk melanjutkan.</span>
    </div>

    <div class="container">
        <header>
            <div class="profile-main">
                <div class="avatar-container">
                    <img id="user-avatar" src="/assets/users/avatar/default.png" alt="Guest Avatar">
                </div>
                <div class="user-info">
                    <h3 id="user-name">Guest</h3>
                    <span id="user-id">#---</span>
                </div>
            </div>
            <!-- Skip button removed -->
        </header>

        <div id="game-board">
            <!-- Grid generated by JS -->
        </div>

        <div id="keyboard">
            <!-- Keyboard generated by JS -->
        </div>

        <div id="dialog-overlay">
            <div class="dialog-container">
                <div class="mascot-frame">
                    <img src="/assets/milky-illust-animated.gif" alt="Milky Mascot">
                </div>
                <h4 class="speaker-name">Milky</h4>
                <div class="dialog-box">
                    <p id="dialog-text">Loading tutorial...</p>
                </div>
                <div id="dialog-options"></div>
            </div>
        </div>

        <div id="fade-overlay"></div>
    </div>

    <script src="/wordle/tutorial.js"></script>
</body>
</html>
